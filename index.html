<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC College Student Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#fff;
    padding:30px;
    width:350px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.logo{
    width:100px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}
</style>

</head>

<body>

<div class="container">

<img src="images.png" class="logo" alt="APEC Logo">

<h2>APEC College Student Login</h2>

<form action="https://formspree.io/f/mrewowgb" method="POST">

<input
type="text"
name="Student_Name"
placeholder="Enter Student Name"
required>

<input
type="text"
name="Student_ID"
placeholder="Enter Student ID"
required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
